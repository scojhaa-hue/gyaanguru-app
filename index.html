<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GyaanGuru</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:white;
}

.header{
background:#1e293b;
text-align:center;
padding:15px;
font-size:18px;
}

.container{
padding:10px;
}

select,button,input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:none;
font-size:16px;
}

button{
background:#22c55e;
color:white;
font-weight:bold;
}

.card{
background:#1e293b;
padding:12px;
border-radius:12px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="header">
📚 GyaanGuru<br>
"Think Beyond Books"
</div>

<div class="container">

<select id="chapter">
<option>Photosynthesis</option>
<option>Force</option>
<option>Motion</option>
</select>

<button onclick="loadContent()">Load Content</button>

<div class="card" id="notes">Notes will appear here</div>
<div class="card" id="mnemonic"></div>
<div class="card" id="video"></div>

<input id="question" placeholder="Ask your doubt">

<button onclick="ask()">Ask</button>

<div class="card" id="answer"></div>

<button onclick="quiz()">Start Quiz</button>

</div>

<script>

const data={
Photosynthesis:{
notes:"Plants make food using sunlight, CO2 and water.",
mnemonic:"SUN = Sunlight Use Nutrients",
video:"https://www.youtube.com/embed/xuYz3lRsm2I"
},
Force:{
notes:"Force is push or pull.",
mnemonic:"Push + Pull = Force",
video:"https://www.youtube.com/embed/1Vg9Zg4nYz8"
},
Motion:{
notes:"Motion is change in position.",
mnemonic:"Move Over Time",
video:"https://www.youtube.com/embed/nX3w9XJ2V5E"
}
};

function loadContent(){
let c=document.getElementById("chapter").value;

document.getElementById("notes").innerText=data[c].notes;
document.getElementById("mnemonic").innerText="Mnemonic: "+data[c].mnemonic;

document.getElementById("video").innerHTML=
<iframe width="100%" height="200" src="${data[c].video}" frameborder="0" allowfullscreen></iframe>;
}

function ask(){
let q=document.getElementById("question").value;
document.getElementById("answer").innerText=
"Ojha Sir: " + q + " → समझो, याद मत करो 👍";
}

function quiz(){
let ans=prompt("What is Force?");
if(ans && ans.toLowerCase().includes("push")){
alert("Correct 🎉");
}else{
alert("Try again");
}
}

</script>

</body>
</html>
