<!DOCTYPE html>
<html>
<head>
  <title>GyaanGuru AI App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #eef2f7;
      margin: 0;
    }

    header {
      background: #2e7d32;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 12px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #2e7d32;
      color: white;
      font-size: 14px;
      margin-top: 10px;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .result {
      margin-top: 10px;
      padding: 10px;
      background: #f1f1f1;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<header>📚 GyaanGuru AI Teacher</header>

<div class="container">

  <div class="card">
    <h3>🧑‍🏫 Ojha Sir Teaching</h3>
    <button onclick="startClass()">Start Class</button>
  </div>

  <div class="card">
    <h3>🎬 Animation</h3>
    <button onclick="watchVideo()">Watch Animation</button>
  </div>

  <div class="card">
    <h3>📝 Answer Checker</h3>
    <textarea id="answer" placeholder="Write your answer here..."></textarea>
    <button onclick="checkAnswer()">Check Answer</button>
    <div id="result" class="result"></div>
  </div>

</div>

<script>

function startClass(){
  alert("Ojha Sir is teaching: Photosynthesis is the process by which plants make food using sunlight.");
}

function watchVideo(){
  window.location.href = "https://www.youtube.com/watch?v=CM9aVYfZ7tQ";
}

function checkAnswer(){
  let ans = document.getElementById("answer").value.toLowerCase();

  if(ans.length < 20){
    document.getElementById("result").innerHTML =
    "Score: 3/10 ❌ Answer too short. Write more explanation.";
  }
  else if(ans.includes("photosynthesis")){
    document.getElementById("result").innerHTML =
    "Score: 8/10 ✅ Good answer. Add diagram and keywords for full marks.";
  }
  else{
    document.getElementById("result").innerHTML =
    "Score: 5/10 ⚠️ Improve keywords and clarity.";
  }
}

</script>

</body>
</html>
