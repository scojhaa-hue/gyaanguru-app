<!DOCTYPE html>
<html>
<head>
<title>GyaanGuru App</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {font-family:Arial; background:#f2f5f7; margin:0;}

header{
background:#0d47a1;
color:white;
padding:12px;
text-align:center;
font-size:18px;
}

.card{
background:white;
margin:10px;
padding:12px;
border-radius:10px;
}

select, textarea{
width:100%;
padding:8px;
margin-top:5px;
}

button{
width:100%;
padding:10px;
margin-top:8px;
background:#0d47a1;
color:white;
border:none;
border-radius:6px;
}
</style>
</head>

<body>

<header>🎓 GyaanGuru - By Ojha Sir</header>

<div class="card">
<h3>Class</h3>
<select id="class">
<option>6</option><option>7</option><option>8</option>
<option>9</option><option>10</option>
<option>11</option><option>12</option>
</select>

<h3>Subject</h3>
<select id="subject">
<option>Science</option>
<option>Math</option>
<option>English</option>
<option>Hindi</option>
</select>

<h3>Chapter</h3>
<select id="chapter">
<option>Photosynthesis</option>
<option>Motion</option>
<option>Force</option>
<option>Algebra</option>
</select>

<button onclick="loadContent()">Load Content</button>
</div>

<div class="card">
<h3>Notes</h3>
<p id="notes">Click Load Content</p>
<p id="mnemonic"></p>

<button onclick="video()">Watch Video</button>
</div>

<div class="card">
<h3>Ojha Sir Whiteboard</h3>
<textarea id="q"></textarea>
<button onclick="teach()">Ask</button>
<p id="ans"></p>
</div>

<div class="card">
<h3>Answer Evaluation</h3>

<select id="marks">
<option>1</option>
<option>2</option>
<option>3</option>
<option>5</option>
<option>10</option>
</select>

<textarea id="answer"></textarea>
<button onclick="check()">Check</button>

<p id="result"></p>
</div>

<div class="card">
<h3>🎮 Play to Learn</h3>
<button onclick="quiz()">Start Quiz</button>
<p id="quiz"></p>
</div>

<script>

function loadContent(){
let ch = document.getElementById("chapter").value;

if(ch=="Photosynthesis"){
notes.innerText="Plants make food using sunlight";
mnemonic.innerText="SUN = Sunlight + CO2 + Water";
}
else if(ch=="Motion"){
notes.innerText="Motion = change in position";
mnemonic.innerText="DST = Distance Speed Time";
}
else if(ch=="Force"){
notes.innerText="Force = push or pull";
mnemonic.innerText="F = ma";
}
else{
notes.innerText="Basic concept";
mnemonic.innerText="Learn smart";
}
}

function video(){
let ch=document.getElementById("chapter").value;

if(ch=="Photosynthesis")
window.open("https://youtu.be/UPBMG5EYydo");

if(ch=="Motion")
window.open("https://youtu.be/nA9xNaHYZk4");

if(ch=="Force")
window.open("https://youtu.be/3HjZ0r9dW2I");
}

function teach(){
let q=document.getElementById("q").value;
document.getElementById("ans").innerText=
"Ojha Sir: "+q+" ko simple tarike se samjho";
}

function check(){
let m=document.getElementById("marks").value;
let score=Math.floor(m*0.8);

document.getElementById("result").innerText=
"Score: "+score+"/"+m+" Improve answer writing";
}

function quiz(){
document.getElementById("quiz").innerText=
"Q: What is force?";
}

</script>

</body>
</html>
