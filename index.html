<!DOCTYPE html>
<html>
<head>
  <title>GyaanGuru v6</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; margin:0; background:#eef2f7; }
    header { background:#d32f2f; color:white; padding:15px; text-align:center; }

    .container { padding:10px; }

    .card {
      background:white;
      padding:15px;
      margin-bottom:10px;
      border-radius:10px;
    }

    button {
      width:100%;
      padding:10px;
      margin-top:8px;
      background:#d32f2f;
      color:white;
      border:none;
      border-radius:6px;
    }

    textarea, select {
      width:100%;
      padding:10px;
      margin-top:8px;
    }

    .result {
      margin-top:10px;
      background:#f1f1f1;
      padding:10px;
      border-radius:8px;
    }
  </style>
</head>

<body>

<header>📚 GyaanGuru - Smart Marking System</header>

<div class="container">

  <div class="card">

    <h3>📝 Question</h3>
    <textarea id="question" placeholder="Enter question..."></textarea>

    <h3>🎯 Marks</h3>
    <select id="marks">
      <option value="1">1 Mark</option>
      <option value="2">2 Marks</option>
      <option value="3">3 Marks</option>
      <option value="5">5 Marks</option>
      <option value="10">10 Marks</option>
    </select>

    <h3>✍️ Answer</h3>
    <textarea id="answer" placeholder="Write answer..."></textarea>

    <button onclick="evaluate()">Check Answer</button>

    <div id="result" class="result"></div>

  </div>

</div>

<script>

function evaluate(){

  let ans = document.getElementById("answer").value.toLowerCase();
  let maxMarks = parseInt(document.getElementById("marks").value);

  let score = 0;
  let feedback = "";
  let mnemonic = "";

  // Evaluation logic
  if(ans.length < 20){
    score = Math.floor(maxMarks * 0.3);
    feedback = "Answer short hai. Detail likho.";
  }
  else if(ans.includes("definition")){
    score = Math.floor(maxMarks * 0.6);
    feedback = "Definition sahi hai. Example add karo.";
  }
  else if(ans.includes("process") || ans.includes("formula")){
    score = Math.floor(maxMarks * 0.8);
    feedback = "Achha answer hai. Diagram/keywords add karo.";
  }
  else{
    score = Math.floor(maxMarks * 0.5);
    feedback = "Answer average hai. Structure improve karo.";
  }

  mnemonic = "👉 Trick: 'DEF' = Definition + Example + Formula";

  document.getElementById("result").innerHTML =
  "Score: " + score + "/" + maxMarks + "<br><br>" +
  "📊 Feedback: " + feedback + "<br><br>" +
  "🧠 Mnemonic: " + mnemonic;

}

</script>

</body>
</html>
